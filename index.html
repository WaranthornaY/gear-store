<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX // QUANTUM INTEGRATED SYSTEM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        body { font-family: 'Rajdhani', sans-serif; background: radial-gradient(circle, #09121a 0%, #020508 100%); color: #c4d7e6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background: rgba(10, 25, 30, 0.85); border: 2px solid #00ff88; border-radius: 4px; padding: 30px; width: 100%; max-width: 420px; box-shadow: 0 0 25px rgba(0, 255, 136, 0.25); backdrop-filter: blur(8px); position: relative; text-align: center; }
        
        h2 { font-family: 'Orbitron', sans-serif; margin: 0; color: #00ff88; letter-spacing: 3px; text-shadow: 0 0 10px rgba(0, 255, 136, 0.6); }
        .subtitle { font-size: 13px; text-transform: uppercase; letter-spacing: 2px; color: #618b9c; margin-bottom: 20px; border-bottom: 1px solid rgba(97, 139, 156, 0.3); padding-bottom: 10px; }
        
        label { display: block; text-align: left; margin: 12px 0 4px; font-weight: 700; text-transform: uppercase; font-size: 14px; color: #00ff88; }
        input, select { width: 100%; padding: 10px; border: 1px solid #1a3a3a; background: rgba(5, 15, 20, 0.8); color: #ffffff; box-sizing: border-box; font-size: 15px; font-family: 'Rajdhani', sans-serif; margin-bottom: 10px; }
        
        button { width: 100%; padding: 14px; background: transparent; color: #00ff88; border: 2px solid #00ff88; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 2px; cursor: pointer; text-transform: uppercase; margin-top: 15px; transition: all 0.3s; }
        button:hover { background: #00ff88; color: #020508; box-shadow: 0 0 15px rgba(0, 255, 136, 0.6); }
        
        #admin-view, #pin-container, #order-details { display: none; }
        #status { margin-top: 15px; font-family: 'Orbitron', sans-serif; font-size: 13px; }
        .success { color: #00ff88; }
        .error { color: #ff3333; }
        .admin-toggle { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #1a3a3a; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <button class="admin-toggle" onclick="triggerAdminMode()">[SYS]</button>

    <div id="customer-view">
        <h2>MANIFEST INJECTOR</h2>
        <div class="subtitle">Secure Order Generation</div>
        
        <form id="purchaseForm">
            <label>// REAL NAME</label>
            <input type="text" id="realName" placeholder="First & Last Name..." required>
            
            <label>// SCHOOL NICKNAME</label>
            <input type="text" id="nickname" placeholder="What people call you..." required>
            
            <label>// ROBLOX USERNAME</label>
            <input type="text" id="username" placeholder="Exact spelling..." required>
            
            <label>// SELECTED GEAR</label>
            <select id="item">
                <option value="Vest Police">TACTICAL POLICE VEST</option>
                <option value="6 gold chain guns">6X GOLD CHAIN GUNS</option>
                <option value="HyperlaserGun">HYPERLASER BLASTER</option>
                <option value="Riot Shield">RIOT SHIELD</option>
            </select>
            <button type="submit">Generate Security PIN</button>
        </form>

        <div id="pin-container">
            <h3 style="font-family: 'Orbitron'; color: #00ff88; margin-top: 20px;">ACCESS PIN GENERATED</h3>
            <div id="pin-display" style="font-size: 48px; color: #fff; margin: 10px 0; letter-spacing: 15px;">0000</div>
            <p style="font-size: 14px; color: #a2bccc;">Present this PIN to the Admin terminal.</p>
        </div>
    </div>

    <div id="admin-view">
        <h2>ADMIN TERMINAL</h2>
        <div class="subtitle">Manual PIN Authorization</div>
        
        <label>// ENTER CUSTOMER PIN</label>
        <input type="password" id="pin-input" placeholder="0000" maxlength="4">
        <button onclick="verifyPin()">Validate & Deploy</button>

        <div id="order-details" style="text-align: left; margin-top: 20px; background: rgba(255,255,255,0.05); padding: 15px; border-left: 3px solid #00ff88;">
            <p><strong>👤 Name:</strong> <span id="display-name"></span></p>
            <p><strong>🎭 Nickname:</strong> <span id="display-nickname"></span></p>
            <p><strong>🎮 Roblox:</strong> <span id="display-user"></span></p>
            <p><strong>⚔️ Item:</strong> <span id="display-item"></span></p>
            <button id="approve-btn" style="background:#00ff88; color:#000;">MARK PAID & DEPLOY</button>
        </div>
        
        <button onclick="exitAdminMode()" style="border-color:#ff3333; color:#ff3333; margin-top:20px;">Exit Terminal</button>
    </div>

    <div id="status"></div>
</div>

<script>
    const GOOGLE_WEB_URL = "https://script.google.com/macros/s/AKfycbzhm8PrRSgIAZgveKSN9LetLLHl0aOHpgky-CE96qvN62G1Ioah00J5mOa8ADPSJZTT/exec";
    const ADMIN_PASSWORD = "1234";

    // CUSTOMER: Save order to Google Sheet
    document.getElementById('purchaseForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const statusDiv = document.getElementById('status');
        statusDiv.innerText = ">> UPLINKING TO DATABASE...";
        
        const rName = document.getElementById('realName').value;
        const nName = document.getElementById('nickname').value;
        const uName = document.getElementById('username').value;
        const item = document.getElementById('item').value;
        
        const url = `${GOOGLE_WEB_URL}?action=saveOrder&rName=${encodeURIComponent(rName)}&nName=${encodeURIComponent(nName)}&uName=${encodeURIComponent(uName)}&item=${encodeURIComponent(item)}`;
        
        try {
            const pin = await fetch(url).then(res => res.text());
            document.getElementById('pin-display').innerText = pin;
            document.getElementById('pin-container').style.display = "block";
            statusDiv.className = "success";
            statusDiv.innerText = ">> SECURITY PIN DEPLOYED.";
        } catch (err) {
            statusDiv.className = "error";
            statusDiv.innerText = ">> UPLINK FAILURE.";
        }
    });

    // ADMIN: Verification Logic
    function triggerAdminMode() {
        if (prompt("ENTER SYSTEM OVERRIDE:") === ADMIN_PASSWORD) {
            document.getElementById('customer-view').style.display = "none";
            document.getElementById('admin-view').style.display = "block";
        }
    }

    async function verifyPin() {
        const pin = document.getElementById('pin-input').value;
        const res = await fetch(`${GOOGLE_WEB_URL}?action=verifyPin&pin=${pin}`);
        const data = await res.json();

        if (data.uName) {
            document.getElementById('display-name').innerText = data.rName;
            document.getElementById('display-nickname').innerText = data.nName;
            document.getElementById('display-user').innerText = data.uName;
            document.getElementById('display-item').innerText = data.item;
            document.getElementById('order-details').style.display = "block";
        } else {
            alert("PIN invalid or already processed.");
        }
    }

    function exitAdminMode() {
        document.getElementById('admin-view').style.display = "none";
        document.getElementById('customer-view').style.display = "block";
    }
</script>
</body>
</html>
