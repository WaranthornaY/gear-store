<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MATRIX // QUANTUM INTEGRATED SYSTEM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        body { font-family: 'Rajdhani', sans-serif; background: #020508; color: #c4d7e6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: rgba(10, 25, 30, 0.9); border: 2px solid #00ff88; padding: 30px; width: 400px; text-align: center; position: relative; border-radius: 4px; }
        h2 { font-family: 'Orbitron', sans-serif; color: #00ff88; margin: 0; letter-spacing: 2px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #050f14; border: 1px solid #1a3a3a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: transparent; color: #00ff88; border: 2px solid #00ff88; cursor: pointer; text-transform: uppercase; font-weight: bold; margin-top: 10px; }
        button:hover { background: #00ff88; color: black; }
        #admin-view, #pin-container, #order-details { display: none; }
        .admin-toggle { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #1a3a3a; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <button class="admin-toggle" onclick="triggerAdminMode()">[SYS]</button>
        <div id="customer-view">
            <h2>MANIFEST INJECTOR</h2>
            <form id="purchaseForm">
                <input type="text" id="realName" placeholder="Real Name" required>
                <input type="text" id="nickname" placeholder="Nickname" required>
                <input type="text" id="username" placeholder="Roblox Username" required>
                <select id="item">
                    <option>Vest Police</option>
                    <option>6 gold chain guns</option>
                    <option>Riot Shield</option>
                    <option>HyperlaserGun</option>
                    <option>Assault Rifle</option>
                </select>
                <button type="submit">Generate PIN</button>
            </form>
            <div id="pin-container"><h3>ACCESS PIN:</h3><div id="pin-display" style="font-size: 40px; color:white;">0000</div></div>
        </div>
        <div id="admin-view">
            <h2>ADMIN TERMINAL</h2>
            <input type="password" id="pin-input" placeholder="Enter PIN">
            <button onclick="verifyPin()">Validate</button>
            <div id="order-details" style="text-align: left;">
                <p>👤 Name: <span id="display-name"></span></p>
                <p>🎭 Nick: <span id="display-nickname"></span></p>
                <p>🎮 User: <span id="display-user"></span></p>
                <p>⚔️ Item: <span id="display-item"></span></p>
                <button onclick="markPaid()" style="background:#00ff88; color:black;">MARK PAID & DEPLOY</button>
            </div>
            <button onclick="location.reload()" style="border-color:red; color:red;">EXIT</button>
        </div>
    </div>
    <script>
        const GOOGLE_WEB_URL = "https://script.google.com/macros/s/AKfycbx0lFghBwYB_QF6CuTVxFr2F_oqWqZMCbe7kSlUv3bS1OABcdHWR6eYet4dTsL9kQ3b/exec";
        
        document.getElementById('purchaseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = `${GOOGLE_WEB_URL}?action=saveOrder&rName=${encodeURIComponent(document.getElementById('realName').value)}&nName=${encodeURIComponent(document.getElementById('nickname').value)}&uName=${encodeURIComponent(document.getElementById('username').value)}&item=${encodeURIComponent(document.getElementById('item').value)}`;
            const pin = await fetch(url).then(r => r.text());
            document.getElementById('pin-display').innerText = pin;
            document.getElementById('pin-container').style.display = "block";
        });

        async function verifyPin() {
            const pin = document.getElementById('pin-input').value;
            const res = await fetch(`${GOOGLE_WEB_URL}?action=verifyPin&pin=${pin}`);
            const data = await res.json();
            if (data.uName) {
                document.getElementById('display-name').innerText = data.rName;
                document.getElementById('display-nickname').innerText = data.nName;
                document.getElementById('display-user').innerText = data.uName;
                document.getElementById('display-item').innerText = data.item;
                document.getElementById('order-details').style.display = "block";
            } else { alert("Invalid or processed PIN."); }
        }

        async function markPaid() {
            const pin = document.getElementById('pin-input').value;
            const res = await fetch(`${GOOGLE_WEB_URL}?action=markPaid&pin=${pin}`);
            if(await res.text() === "SUCCESS") { alert("Status: PAID"); location.reload(); }
        }

        function triggerAdminMode() { if(prompt("CODE:") === "1234") { document.getElementById('customer-view').style.display = "none"; document.getElementById('admin-view').style.display = "block"; } }
    </script>
</body>
</html>
